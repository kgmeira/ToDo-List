<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>To-Do Pro</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    padding: 40px;
    transition: 0.3s;
}

/* DARK MODE */
.dark {
    background: #1e1e2f;
    color: white;
}

.container {
    background: white;
    padding: 20px;
    width: 380px;
    border-radius: 15px;
}

.dark .container {
    background: #2a2a40;
}

/* Inputs */
input, select, button {
    width: 100%;
    padding: 8px;
    margin-top: 8px;
}

/* Lista */
ul { list-style: none; padding: 0; }

li {
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
}

/* Prioridades */
.alta { border-left: 5px solid red; }
.media { border-left: 5px solid orange; }
.baixa { border-left: 5px solid green; }

/* Concluído */
.completed {
    text-decoration: line-through;
    opacity: 0.5;
}

/* Barra progresso */
.progress {
    height: 10px;
    background: #ddd;
    border-radius: 5px;
    margin-top: 10px;
}

.progress-bar {
    height: 100%;
    background: #667eea;
    width: 0%;
    border-radius: 5px;
}

/* Botões filtro */
.filters button {
    margin-top: 5px;
}

/* Score */
.score {
    margin-top: 10px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

<h2>🚀 To-Do Pro</h2>

<input id="taskInput" placeholder="Nova tarefa">
<select id="priority">
<option value="alta">Alta</option>
<option value="media">Média</option>
<option value="baixa">Baixa</option>
</select>

<input id="date" type="date">

<button onclick="addTask()">Adicionar</button>

<!-- FILTROS -->
<div class="filters">
<button onclick="setFilter('all')">Todas</button>
<button onclick="setFilter('today')">Hoje</button>
<button onclick="setFilter('week')">Semana</button>
</div>

<!-- PROGRESSO -->
<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

<!-- SCORE -->
<div class="score">Pontos: <span id="score">0</span></div>

<!-- DARK MODE -->
<button onclick="toggleDark()">🌙 Alternar Tema</button>

<ul id="taskList"></ul>

</div>

<script>

/* ===== ESTADO ===== */
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let score = localStorage.getItem("score") || 0;
let filter = "all";

/* ===== SALVAR ===== */
function save() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
    localStorage.setItem("score", score);
}

/* ===== FILTRO ===== */
function setFilter(f) {
    filter = f;
    render();
}

/* ===== DATA ===== */
function isToday(date) {
    return date === new Date().toISOString().split("T")[0];
}

function isWeek(date) {
    const now = new Date();
    const taskDate = new Date(date);
    const diff = (taskDate - now) / (1000 * 60 * 60 * 24);
    return diff <= 7 && diff >= 0;
}

/* ===== NOTIFICAÇÃO ===== */
function notifyTodayTasks() {
    const todayTasks = tasks.filter(t => isToday(t.date) && !t.completed);

    if (todayTasks.length > 0) {
        alert("🔔 Você tem " + todayTasks.length + " tarefa(s) hoje!");
    }
}

/* ===== PROGRESSO ===== */
function updateProgress() {
    const done = tasks.filter(t => t.completed).length;
    const total = tasks.length;

    const percent = total ? (done / total) * 100 : 0;

    document.getElementById("progressBar").style.width = percent + "%";
}

/* ===== RENDER ===== */
function render() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    let filtered = tasks;

    if (filter === "today") {
        filtered = tasks.filter(t => isToday(t.date));
    }

    if (filter === "week") {
        filtered = tasks.filter(t => isWeek(t.date));
    }

    filtered.forEach((task, i) => {

        const li = document.createElement("li");
        li.className = task.priority;

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = task.completed;

        checkbox.onchange = () => {
            task.completed = checkbox.checked;

            if (checkbox.checked) {
                score++;
            } else {
                score--;
            }

            save();
            render();
        };

        const span = document.createElement("span");
        span.textContent = task.text;

        if (task.completed) span.classList.add("completed");

        const remove = document.createElement("button");
        remove.textContent = "X";

        remove.onclick = () => {
            tasks.splice(i, 1);
            save();
            render();
        };

        const date = document.createElement("div");
        date.textContent = "📅 " + (task.date || "Sem data");

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(remove);
        li.appendChild(date);

        list.appendChild(li);
    });

    updateProgress();
    document.getElementById("score").textContent = score;
}

/* ===== ADD ===== */
function addTask() {
    const text = document.getElementById("taskInput").value;
    const priority = document.getElementById("priority").value;
    const date = document.getElementById("date").value;

    if (!text.trim()) return;

    tasks.push({ text, priority, date, completed: false });

    save();
    render();
}

/* ===== DARK MODE ===== */
function toggleDark() {
    document.body.classList.toggle("dark");
}

/* ===== INIT ===== */
render();
notifyTodayTasks();

</script>

</body>
</html>
